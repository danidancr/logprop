<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="pg-cadastro">
    <div class="container">
        <div class="form-image">
            <img src="imagem/cadastro_entrar.png" alt="ilustração de Cadastro/login" class="imagem-responsiva">
        </div>

        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="titulo">
                        <h1>Entrar</h1>
                    </div>
                </div>

                <div class="input-group">
                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder="Digite seu e-mail" required>
                    </div>

                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <div class="btn-cadastrar">
                    <a href="cadastrar.html" class="botao login">Ainda não tem conta?</a>
                    <button type="submit" class="botao entrar">Entrar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
