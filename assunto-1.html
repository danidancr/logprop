<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios - Lógica Proposicional | +LogProp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="pagina-exercicio">
        <div class="interface">
            <!-- Barra de Progresso -->
            <div class="barra-progresso">
                <div class="progresso-container">
                    <div class="progresso-completo" id="progresso-completo"></div>
                </div>
                <div class="marcadores-exercicios" id="marcadores-exercicios"></div>
            </div>
            
            <!-- Exercício Atual -->
            <div class="exercicio-container" id="exercicio-container"></div>
            
            <!-- Controles -->
            <div class="controles-exercicio">
                <button class="botao-responder" id="botao-responder" disabled>Responder</button>
            </div>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
